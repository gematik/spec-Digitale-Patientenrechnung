# This is a basic workflow to help you get started with Actions

name: CI (FHIR Validation)

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  # Validate all resources using Firely Terminal 
  CI_FHIR_VALIDATION:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout code (PR)
        uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      
      - name: Checkout code (Main)
        uses: actions/checkout@v4
        if: github.event_name != 'pull_request'
        
      # Java and .NET are already installed on ubuntu-latest
        
      - name: Firely.Terminal (GitHub Actions)
        uses: FirelyTeam/firely-terminal-pipeline@v0.8.4
        with:
          PATH_TO_CONFORMANCE_RESOURCES: Resources/fsh-generated/resources/
          #PATH_TO_EXAMPLES: Examples
          PATH_TO_QUALITY_CONTROL_RULES: qc/custom
          DOTNET_VALIDATION_ENABLED: false
          JAVA_VALIDATION_ENABLED: true
          JAVA_VALIDATION_OPTIONS: >
            -allow-example-urls true
            -output validation.json
            -html-output validation.html
            -show-message-ids
            -language de
            -jurisdiction de
            -display-issues-are-warnings
            -advisor-file validator/advisor.json
            -resolution-context file:Resources/fsh-generated/resources/
          SIMPLIFIER_USERNAME: ${{ secrets.SIMPLIFIER_USERNAME }}
          SIMPLIFIER_PASSWORD: ${{ secrets.SIMPLIFIER_PASSWORD }}
          SUSHI_ENABLED: true
          SUSHI_OPTIONS: Resources/

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fhir-validation-results
          path: |
            validation.json
            validation.html
          retention-days: 1

      - name: Convert Validation Report
        uses: patrick-werner/validation-outcome-markdown-renderer@v1
        with:
          bundle-file: validation.json
          include: errors
          filters: |
            # Struktur: fileName|messageId|detailsWildcard|location
            |Validation_VAL_Profile_MatchMultiple|*|DocumentReference.​type.​coding[0]
            |Terminology_TX_Confirm_4a|*|DocumentReference.​type.​coding[0]
            |Validation_VAL_Profile_MatchMultiple|*|Parameters.*
            |Terminology_TX_Confirm_4a|*|Parameters.*


          
      - name: Add & Commit
        uses: EndBug/add-and-commit@v9
        with:
          add: 'Resources/fsh-generated/resources/'
